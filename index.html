  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      color: #FFFFFF;
      overflow-x: hidden;
    }
    .font-serif {
      font-family: 'Cormorant Garamond', serif;
    }
    ::-webkit-scrollbar {
      display: none;
    }
    html {
      scrollbar-width: none;
    }
    .preserve-3d {
      transform-style: preserve-3d;
    }

    /* ─── PREVENZIONE FLASH DI CARICAMENTO INIZIALE ─── */
    .scene-card {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    /* ─── ANIMAZIONI E STILI PER IL SISTEMA ORBITALE (SCENE 9) ─── */
    @keyframes orbit-rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    @keyframes counter-rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(-360deg); }
    }
    @keyframes pulse-ring-optimized {
      0%, 100% { opacity: 0.2; transform: scale(0.95); }
      50% { opacity: 0.4; transform: scale(1.05); }
    }
    .pulse-ring-element {
      position: absolute;
      width: 380px;
      height: 380px;
      background-color: rgba(242, 210, 139, 0.05);
      filter: blur(48px);
      border-radius: 9999px;
      will-change: transform, opacity;
      animation: pulse-ring-optimized 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }
    .orbit-ring {
      position: relative;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 25px rgba(255, 255, 255, 0.05);
      animation: orbit-rotation 40s linear infinite;
    }
    .orbit-wrapper {
      position: absolute;
      width: 64px;
      height: 64px;
      transform: translate(-50%, -50%);
    }
    .orbit-item {
      position: relative;
      width: 100%;
      height: 100%;
      animation: counter-rotation 40s linear infinite;
      transform-origin: center;
    }
    .orbit-link {
      display: flex;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.1);
      box-sizing: border-box;
      transition: 0.3s;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      text-decoration: none;
    }
    .orbit-link:hover {
      border-color: #F2D28B;
      box-shadow: 0 0 15px rgba(242, 210, 139, 0.4);
    }
    .orbit-img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .orbit-img.cover {
      object-fit: cover;
    }
    .orbit-img.rounded {
      border-radius: 9999px;
    }
    .orbit-center-photo {
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 4px solid #F2D28B;
      padding: 4px;
      background: #000;
      box-shadow: 0 10px 40px rgba(0,0,0,0.8);
      z-index: 10;
      box-sizing: border-box;
    }
    .orbit-center-photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }
    .orbit-tooltip {
      position: absolute;
      bottom: 85px;
      left: 50%;
      transform: translateX(-50%);
      width: 220px;
      background: #0a0a0c;
      border: 1px solid rgba(255,255,255,0.08);
      color: #94a3b8;
      font-size: 11px;
      border-radius: 8px;
      padding: 12px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
      text-align: center;
      z-index: 100;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      line-height: 1.4;
    }
    .orbit-tooltip b {
      color: white;
      display: block;
      margin-bottom: 4px;
    }
    .orbit-item:hover .orbit-tooltip {
      opacity: 1;
    }

            <button type="submit" class="bg-[#F2D28B] text-black text-xs tracking-widest font-black uppercase py-5 rounded-2xl hover:bg-white transition-all duration-300 cursor-pointer w-full font-mono">
              Invia Messaggio Aziendale
            </button>
          </form>
        `;
      }

      // ─── COLONNA DESTRA (SISTEMA ORBITALE - NASCOSTO SU SMARTPHONE PER FAR COMPARIRE I VIDEO) ───
      let rightColumnContent = logoColumn;
      if (scene.isIntro) {
        rightColumnContent = rickyPhotoColumn;
      } else if (scene.isTheUnion) {
        rightColumnContent = `
          <div id="orbit-container-target" class="hidden md:flex relative w-[400px] h-[400px] items-center justify-center scale-95 md:scale-110 mt-6 md:mt-0 pointer-events-auto">
            ${orbitHTML ? orbitHTML : "Caricamento Ecosistema..."}
          </div>
        `;
      }

      const tagType = scene.isProduct ? "a" : "div";
      const hrefAttr = scene.isProduct ? `href="${scene.url}" target="_blank" rel="noopener noreferrer"` : "";
      const cursorClass = scene.isProduct ? "cursor-pointer hover:border-[#F2D28B]/30 hover:shadow-[0_40px_100px_rgba(242,210,139,0.05)] transition-all duration-300" : "";

      // Layout compatto per mobile, grande per desktop
      let cardSizeClass = "max-w-3xl";
      if (scene.isIntro || scene.isTheUnion) {
        cardSizeClass = "max-w-6xl p-5 md:p-16 gap-16 lg:gap-24";
      } else if (scene.isContact) {
        cardSizeClass = "max-w-4xl p-5 md:p-14";
      } else {
        cardSizeClass = "max-w-3xl p-5 md:p-14";
      }

      // Costruzione finale della scheda
      cardWrapper.innerHTML = `
        <${tagType} ${hrefAttr} class="scene-card w-full ${cardSizeClass} bg-[#07070a]/92 backdrop-blur-3xl border border-white/10 rounded-2xl md:rounded-[3rem] shadow-[0_40px_100px_rgba(0,0,0,0.95)] preserve-3d opacity-0 pointer-events-none flex flex-col ${flexDirClass} gap-4 md:gap-12 items-center justify-between ${cursorClass}">
          <div class="flex-1 text-left w-full max-w-xl">
            <!-- Logo nell'intestazione della scheda con percorso corretto public/loghi/ -->
            <div class="flex items-center gap-4 mb-4">
              <img src="public/loghi/${scene.logo}" alt="${scene.title} Logo" class="w-10 h-10 object-contain rounded-xl bg-black/40 p-1 border border-white/10" onerror="this.style.display='none'">
              <div>
                <span class="text-[9px] uppercase tracking-[0.4em] text-[#F2D28B] block font-semibold font-mono">${scene.chapter}</span>
                <h2 class="font-serif text-2xl md:text-4xl text-[#F6F3F0] tracking-wide leading-tight">${scene.title}</h2>
              </div>
            </div>
            <p class="text-base tracking-wide text-neutral-300 leading-relaxed font-light">${scene.subtitle}</p>
            ${editorialBody}
            ${introButton}
            ${siteLinkButton}
            ${contactForm}
          </div>
          ${rightColumnContent}
        </${tagType}>
      `;

      overlayContainer.appendChild(cardWrapper);
    });

    // ─── FUNZIONI INTERATTIVE (VCARD & CONTATTI) ───
    function handleVCardClick() {
      const link = document.createElement("a");
      link.href = "public/contact.vcf";
      link.download = "Riccardo_Modena_RMStudio.vcf";
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    async function handleContactSubmit(e) {
      e.preventDefault();
      const form = e.target;
      const formData = new FormData(form);
      const button = form.querySelector("button[type='submit']");
      const originalText = button.innerText;
      button.innerText = "Invio in corso...";
      button.disabled = true;

      try {
        const res = await fetch("https://api.web3forms.com/submit", {
          method: "POST",
          body: formData,
        });

        if (res.ok) {
          alert("Messaggio inviato con successo! Ti risponderò entro 24 ore.");
          form.reset();
        } else {
          alert("Errore nell'invio. Riprova più tardi.");
        }
      } catch {
        alert("Errore di rete. Controlla la connessione.");
      } finally {
        button.innerText = originalText;
        button.disabled = false;
      }
    }

    // ─── BILATERAL LOOP DETECTOR (LOOP INFINITO DEI FOTOGRAMMI E SCHEDE) ───
    window.addEventListener('scroll', () => {
      const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
      if (window.scrollY >= maxScroll - 4) {
        window.scrollTo(0, 15); 
      }
    });

    // ─── SCENOPHONIC 3D TRANSITIONS FORZATE CON INTEGRATIVO AUTOALPHA (VISIBILITY SECURE) ───
    function getSceneProps(index) {
      switch (index) {
        case 0: // Intro / Hero
          return {
            init: { autoAlpha: 0, opacity: 0, scale: 0.7, z: -400, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, scale: 1, z: 0, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, scale: 1.1, z: 100, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" }
          };
        case 1: // NexusAI
          return {
            init: { autoAlpha: 0, opacity: 0, rotateY: 90, x: 250, scale: 1, z: 0, rotateX: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, rotateY: 0, x: 0, scale: 1, z: 0, rotateX: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, rotateY: -90, x: -250, scale: 1, z: 0, rotateX: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" }
          };
        case 2: // Concierge24
          return {
            init: { autoAlpha: 0, opacity: 0, y: -300, rotateX: 45, scale: 1, z: 0, rotateY: 0, x: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, y: 0, rotateX: 0, scale: 1, z: 0, rotateY: 0, x: 0, rotateZ: 0, skewX: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, y: 150, rotateX: -15, scale: 1, z: 0, rotateY: 0, x: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" }
          };
        case 3: // Dentis
          return {
            init: { autoAlpha: 0, opacity: 0, scale: 0.3, z: -700, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, scale: 1, z: 0, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, scale: 1.5, z: 250, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" }
          };
        case 4: // Lexis AI
          return {
            init: { autoAlpha: 0, opacity: 0, rotateY: -60, rotateX: 20, scale: 1, z: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, rotateY: 0, rotateX: 0, scale: 1, z: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, rotateY: 60, rotateX: -20, scale: 1, z: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" }
          };
        case 5: // DriveMotion
          return {
            init: { autoAlpha: 0, opacity: 0, scale: 0.1, z: 0, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, scale: 1, z: 0, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, scale: 0.1, z: 0, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" }
          };
        case 6: // HomeTour AI
          return {
            init: { autoAlpha: 0, opacity: 0, x: 350, skewX: -12, scale: 1, z: 0, rotateX: 0, rotateY: 0, y: 0, rotateZ: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, x: 0, skewX: 0, scale: 1, z: 0, rotateX: 0, rotateY: 0, y: 0, rotateZ: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, x: -350, skewX: 12, scale: 1, z: 0, rotateX: 0, rotateY: 0, y: 0, rotateZ: 0, pointerEvents: "none" }
          };
        case 7: // OmniaStudio
          return {
            init: { autoAlpha: 0, opacity: 0, rotateZ: -180, scale: 0.5, z: 0, rotateX: 0, rotateY: 0, x: 0, y: 0, skewX: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, rotateZ: 0, scale: 1, z: 0, rotateX: 0, rotateY: 0, x: 0, y: 0, skewX: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, rotateZ: 180, scale: 0.5, z: 0, rotateX: 0, rotateY: 0, x: 0, y: 0, skewX: 0, pointerEvents: "none" }
          };
        case 8: // FF Edizioni
          return {
            init: { autoAlpha: 0, opacity: 0, scale: 1.4, z: 200, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, scale: 1, z: 0, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, scale: 0.7, z: -200, rotateX: 0, rotateY: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" }
          };
        case 9: // The Union (Synthesis)
          return {
            init: { autoAlpha: 0, opacity: 0, rotateY: -180, z: -500, scale: 1, rotateX: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, rotateY: 0, z: 0, scale: 1, rotateX: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, rotateY: 180, z: 500, scale: 1, rotateX: 0, x: 0, y: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" }
          };
        case 10: // Contacts / Outro
          return {
            init: { autoAlpha: 0, opacity: 0, y: 150, scale: 1, z: 0, rotateX: 0, rotateY: 0, x: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" },
            mid: { autoAlpha: 1, opacity: 1, y: 0, scale: 1, z: 0, rotateX: 0, rotateY: 0, x: 0, rotateZ: 0, skewX: 0, pointerEvents: "auto" },
            exit: { autoAlpha: 0, opacity: 0, y: -150, scale: 1, z: 0, rotateX: 0, rotateY: 0, x: 0, rotateZ: 0, skewX: 0, pointerEvents: "none" }
          };
      }
    }

    // ─── INIZIALIZZAZIONE TIMELINE E SCROLL-BOUND TRANSITIONS (DISCRETE EVENT TRIGGERS) ───
    function initCardAnimations() {
      const triggers = gsap.utils.toArray("#scroll-triggers section");
      const cards = gsap.utils.toArray(".scene-card");

      triggers.forEach((trigger, index) => {
        const card = cards[index];
        if (!card) return;

        const props = getSceneProps(index);

        // Applichiamo lo stato iniziale fisso con autoAlpha (forza visibility hidden ed evita flash)
        gsap.set(card, props.init);

        // Timeline per la prima scheda (Intro - inizia visibile ed esce allo scorrimento)
        if (index === 0) {
          gsap.set(card, props.mid);
        }

        // Creiamo il trigger discreto infallibile: elimina qualsiasi coesistenza o blocco tra schede
        ScrollTrigger.create({
          trigger: trigger,
          start: "top 50%",   // Entra quando la sezione taglia la metà dello schermo
          end: "bottom 50%", // Esce quando la sezione supera la metà dello schermo
          onEnter: () => {
            gsap.killTweensOf(card);
            gsap.fromTo(card, props.init, { ...props.mid, duration: 0.35, ease: "power2.out" });
          },
          onEnterBack: () => {
            gsap.killTweensOf(card);
            gsap.fromTo(card, props.exit, { ...props.mid, duration: 0.35, ease: "power2.out" });
          },
          onLeave: () => {
            gsap.killTweensOf(card);
            // Non esegue l'uscita se è l'ultimo modulo (Contatti) per non avere vuoto finale
            if (index !== triggers.length - 1) {
              gsap.to(card, { ...props.exit, duration: 0.25, ease: "power2.in" });
            }
          },
          onLeaveBack: () => {
            gsap.killTweensOf(card);
            // Non esegue l'uscita all'indietro se è il primo modulo (Intro)
            if (index !== 0) {
              gsap.to(card, { ...props.init, duration: 0.25, ease: "power2.in" });
            }
          }
        });
      });
    }

    preloadImages();
  </script>
