<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradiente lineare nativo ciano-viola allineato al brand -->
    <linearGradient id="rm-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="60%" stop-color="#7000ff" />
      <stop offset="100%" stop-color="#b000ff" />
    </linearGradient>
  </defs>
  
  <!-- Sfondo tondo scuro per garantire leggibilità su tab sia chiari che scuri -->
  <circle cx="256" cy="256" r="240" fill="#030303" stroke="rgba(255,255,255,0.05)" stroke-width="8" />
  
  <!-- Gruppo monogramma RM in alta definizione -->
  <g transform="translate(16, 8) scale(0.92)" fill="none" stroke="url(#rm-gradient)" stroke-width="26" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Nodo iniziale sinistro (Ciano) -->
    <circle cx="100" cy="190" r="16" fill="#030303" stroke="url(#rm-gradient)" stroke-width="12" />
    
    <!-- Tracciato continuo RM ingegnerizzato -->
    <path d="M 124 190 
             L 215 190 
             A 45 45 0 0 1 215 280 
             L 155 280 
             L 215 340 
             A 20 20 0 0 0 230 345
             L 245 345
             A 20 20 0 0 0 265 325
             L 265 205
             A 15 15 0 0 1 280 190
             L 290 190
             A 15 15 0 0 1 303 200
             L 345 260
             L 387 200
             A 15 15 0 0 1 400 190
             L 410 190
             A 15 15 0 0 1 425 205
             L 425 310" />
    
    <!-- Nodo finale destro (Viola) -->
    <circle cx="425" cy="310" r="16" fill="#030303" stroke="url(#rm-gradient)" stroke-width="12" />
  </g>
</svg>
