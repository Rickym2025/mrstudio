<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Gradiente lineare originale RM Studio -->
    <linearGradient id="rm-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f0ff" />
      <stop offset="60%" stop-color="#7000ff" />
      <stop offset="100%" stop-color="#b000ff" />
    </linearGradient>
    
    <!-- Filtro d'ombra ottimizzato per la nuova scala gigante -->
    <filter id="subtle-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000000" flood-opacity="0.65"/>
    </filter>
  </defs>
  
  <!-- Gruppo monogramma in scala gigante senza sfondo rigido -->
  <g filter="url(#subtle-shadow)" transform="translate(4, 4) scale(0.98)" fill="none" stroke="url(#rm-gradient)" stroke-width="32" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Nodo iniziale sinistro (Allineato al nuovo bordo a X=45) -->
    <circle cx="45" cy="180" r="14" fill="#050505" stroke="url(#rm-gradient)" stroke-width="12" />
    
    <!-- Tracciato geometrico RM gigante ad altissima precisione -->
    <path d="M 65 180 
             H 215 
             C 270 180, 270 280, 215 280 
             H 155 
             C 145 280, 142 285, 148 292
             L 215 410 
             C 225 425, 235 435, 255 435 
             H 275
             C 290 435, 300 425, 300 405 
             V 95 
             C 300 80, 305 75, 315 75 
             H 320
             L 365 220
             L 410 75
             C 420 75, 425 80, 425 95
             V 405
             C 425 425, 435 435, 450 435" />
             
    <!-- Nodo finale destro (Allineato al nuovo bordo a X=465 e Y=435) -->
    <circle cx="465" cy="435" r="14" fill="#050505" stroke="url(#rm-gradient)" stroke-width="12" />
  </g>
</svg>
